    <style>
        /* Custom Styles & Glassmorphism | @frontend-design */
        .glass {
            background: rgba(0, 10, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 65, 0.2);

        .gradient-text {

            background-clip: text;

        /* Custom range slider styling */

        input[type=range]::-webkit-slider-thumb {
            height: 20px;

            -webkit-appearance: none;

            margin-top: -7px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.8);
            transition: transform 0.2s ease-in-out;

        input[type=range]:active::-webkit-slider-thumb {

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {

        /* Prevent system font override on certain browsers */
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

<body class="bg-slate-950 text-slate-50 font-sans min-h-screen flex flex-col overflow-x-hidden transition-colors duration-500">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-primary text-white text-[10px] md:text-xs px-2 py-1 rounded opacity-0 transition-opacity group-active/btn:opacity-100 pointer-events-none">Copiado!</span>
                    </button>
                    <button 
                        id="visibility-btn" 
                        class="p-2.5 md:p-3 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all text-slate-300 hover:text-white active:scale-95"
                        title="Alternar visibilidade"
                        aria-label="Alternar visibilidade da senha"
                    >

                            <path id="eye-base" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />

    <!-- Footer | @seo-expert-amb @owasp-secure-code -->
    <footer class="relative z-10 py-12 px-4 shadow-inner">
        <div class="max-w-4xl mx-auto border-t border-slate-800 pt-8 text-center text-slate-500 text-sm">
            by Andre Maurell - 2026
        </div>

    <!-- Scripts | @algorithmic-art @poo-amb @owasp-secure-code -->
    <script>
        /**
         * @class SecureGenerator
         * @description Classe responsável logicamente pela geração de senhas seguras.
         * @principles POO - Encapsulation, @owasp-secure-code - Cryptography
         */
        class SecureGenerator {
            constructor() {
                this.charSets = {
                    upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
                    lower: "abcdefghijklmnopqrstuvwxyz",
                    numbers: "0123456789",
                    symbols: "!@#$%^&*()_+~`|}{[]:;?><,./-="
                };
            }

            /**
             * Gera uma senha usando CSPRNG (Cryptographically Secure Pseudo-Random Number Generator)
             * @param {Object} options - Configurações de geração
             * @returns {string} - Senha gerada
             */
            generate(options) {
                let pool = "";
                if (options.upper) pool += this.charSets.upper;
                if (options.lower) pool += this.charSets.lower;
                if (options.numbers) pool += this.charSets.numbers;
                if (options.symbols) pool += this.charSets.symbols;

                if (pool === "") return "";

                const password = Array.from(window.crypto.getRandomValues(new Uint32Array(options.length)))
                    .map((x) => pool[x % pool.length])
                    .join("");

                return password;
            }
        }

        /**
         * @class AppController
         * @description Controlador da Interface do Usuário (UI).
         * @principles POO - Single Responsibility
         */
        class AppController {
            constructor() {
                this.generator = new SecureGenerator();
                this.elements = {
                    result: document.getElementById('password-result'),
                    slider: document.getElementById('length-slider'),
                    lengthVal: document.getElementById('length-value'),
                    btnGenerate: document.getElementById('generate-btn'),
                    btnCopy: document.getElementById('copy-btn'),
                    btnVisibility: document.getElementById('visibility-btn'),
                    checks: {
                        upper: document.getElementById('include-upper'),
                        lower: document.getElementById('include-lower'),
                        numbers: document.getElementById('include-numbers'),
                        symbols: document.getElementById('include-symbols')
                    }
                };
                this.isVisible = false;
                this.init();
            }

            init() {
                this.elements.slider.addEventListener('input', (e) => this.handleSlider(e));
                this.elements.btnGenerate.addEventListener('click', () => this.handleGenerate());
                this.elements.btnCopy.addEventListener('click', () => this.handleCopy());
                this.elements.btnVisibility.addEventListener('click', () => this.toggleVisibility());
                
                // Inicializar com uma senha
                this.handleGenerate();
            }

            handleSlider(e) {
                this.elements.lengthVal.textContent = e.target.value;
            }

            handleGenerate() {
                const options = {
                    length: parseInt(this.elements.slider.value),
                    upper: this.elements.checks.upper.checked,
                    lower: this.elements.checks.lower.checked,
                    numbers: this.elements.checks.numbers.checked,
                    symbols: this.elements.checks.symbols.checked
                };

                const password = this.generator.generate(options);
                this.currentPassword = password;
                this.updateDisplay();
            }

            updateDisplay() {
                if (this.isVisible) {
                    this.elements.result.value = this.currentPassword;
                } else {
                    this.elements.result.value = "•".repeat(this.currentPassword.length);
                }
                
                // Adjust font size based on length for mobile
                if (window.innerWidth < 768) {
                    const res = this.elements.result;
                    res.classList.remove('text-xl', 'text-lg', 'text-sm');
                    if (this.currentPassword.length > 24) {
                        res.classList.add('text-sm');
                    } else if (this.currentPassword.length > 16) {
                        res.classList.add('text-lg');
                    } else {
                        res.classList.add('text-xl');
                    }
                }
            }

            toggleVisibility() {
                this.isVisible = !this.isVisible;
                this.updateDisplay();
                
                const eyeIcon = document.getElementById('eye-icon');
                const eyePath = document.getElementById('eye-path');
                
                if (this.isVisible) {
                    this.elements.btnVisibility.classList.add('text-primary');
                    // Eye with slash
                    eyePath.setAttribute('d', 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21');
                } else {
                    this.elements.btnVisibility.classList.remove('text-primary');
                    // Eye open
                    eyePath.setAttribute('d', 'M15 12a3 3 0 11-6 0 3 3 0 016 0z');
                }
            }

            async handleCopy() {
                if (!this.currentPassword) return;
                try {
                    await navigator.clipboard.writeText(this.currentPassword);
                } catch (err) {
                    console.error('Falha ao copiar:', err);
                }
            }
        }

        /**
         * @function p5 Matrix Rain Sketch
         * @description Gerador de efeito Matrix Rain para o fundo.
         * @skills @algorithmic-art
         */
        let symbols = [];
        let symbolSize = 20;

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('p5-canvas-container');
            background(0);
            
            let x = 0;
            for (let i = 0; i <= width / symbolSize; i++) {
                let stream = new Stream();
                stream.generateSymbols(x, random(-1000, 0));
                symbols.push(stream);
                x += symbolSize;
            }
            textFont('monospace');
            textSize(symbolSize);
        }

        function draw() {
            background(0, 150);
            symbols.forEach(function(stream) {
                stream.render();
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            symbols = [];
            setup();
        }

        function Symbol(x, y, speed, first) {
            this.x = x;
            this.y = y;
            this.value;
            this.speed = speed;
            this.switchInterval = round(random(2, 20));
            this.first = first;

            this.setToRandomSymbol = function() {
                if (frameCount % this.switchInterval == 0) {
                    this.value = String.fromCharCode(
                        0x30A0 + round(random(0, 96))
                    );
                }
            }

            this.rain = function() {
                this.y = (this.y >= height) ? 0 : this.y += this.speed;
            }
        }

        function Stream() {
            this.symbols = [];
            this.totalSymbols = round(random(5, 30));
            this.speed = random(5, 15);

            this.generateSymbols = function(x, y) {
                let first = round(random(0, 4)) == 1;
                for (let i = 0; i <= this.totalSymbols; i++) {
                    let symbol = new Symbol(x, y, this.speed, first);
                    symbol.setToRandomSymbol();
                    this.symbols.push(symbol);
                    y -= symbolSize;
                    first = false;
                }
            }

            this.render = function() {
                this.symbols.forEach(function(symbol) {
                    if (symbol.first) {
                        fill(180, 255, 180);
                    } else {
                        fill(0, 255, 70);
                    }
                    text(symbol.value, symbol.x, symbol.y);
                    symbol.rain();
                    symbol.setToRandomSymbol();
                });
            }
        }

        // Initialize Application
        window.addEventListener('DOMContentLoaded', () => {
            new AppController();
        });
    </script>
