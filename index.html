<!DOCTYPE html>
<html lang="pt-BR" class="dark scroll-smooth">

    <script>

                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#2563eb',
                            dark: '#1e40af',
                            light: '#60a5fa'

    <!-- p5.js for Algorithmic Art | @algorithmic-art -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    
    <style>
        /* Custom Styles & Glassmorphism | @frontend-design */
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
        }

        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            margin-top: -7px;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
            transition: transform 0.2s ease-in-out;
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.2);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Prevent system font override on certain browsers */
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 font-sans min-h-screen flex flex-col overflow-x-hidden transition-colors duration-500">
    
    <!-- Background Canvas Container -->
    <div id="p5-canvas-container" class="fixed inset-0 pointer-events-none z-0 opacity-40"></div>

    <!-- Header Section | @seo-expert-amb -->
    <header class="relative z-10 pt-12 pb-8 text-center px-4 animate-fade-in">
        <h1 class="text-4xl md:text-6xl font-display font-bold mb-4 tracking-tight">
            <span class="gradient-text">Gerador de Senhas</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto font-light">
            Segurança de nível militar. Configure e gere senhas ultra seguras.
        </p>
    </header>

    <!-- Main Content | @poo-amb -->
    <main class="relative z-10 flex-grow flex items-center justify-center p-4">
        <section class="glass rounded-3xl p-8 md:p-12 w-full max-w-2xl shadow-2xl transition-all duration-300 hover:border-primary/30" aria-labelledby="generator-title">
            <h2 id="generator-title" class="sr-only">Configurações do Gerador</h2>
            
            <!-- Result Display -->
            <div class="relative mb-10 group">
                <input 
                    type="text" 
                    id="password-result" 
                    readonly 
                    placeholder="Sua senha aparecerá aqui..."
                    class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl py-6 px-8 text-2xl md:text-3xl font-mono text-center outline-none focus:border-primary/50 transition-all cursor-default placeholder-slate-600"
                    aria-label="Senha gerada"
                    aria-live="polite"
                >
                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
                    <button 
                        id="copy-btn" 
                        class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all text-slate-300 hover:text-white group/btn relative"
                        title="Copiar senha"
                        aria-label="Copiar senha para área de transferência"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-primary text-white text-xs px-2 py-1 rounded opacity-0 transition-opacity group-active/btn:opacity-100 pointer-events-none">Copiado!</span>
                    </button>
                    <button 
                        id="visibility-btn" 
                        class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all text-slate-300 hover:text-white"
                        title="Alternar visibilidade"
                        aria-label="Alternar visibilidade da senha"
                    >
                        <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Controls -->
            <div class="space-y-8">
                <!-- Length Slider -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label for="length-slider" class="text-slate-200 font-medium">Comprimento: <span id="length-value" class="text-primary font-bold">16</span> caracteres</label>
                    </div>
                    <input 
                        type="range" 
                        id="length-slider" 
                        min="8" 
                        max="64" 
                        value="16" 
                        class="w-full h-2 rounded-lg cursor-pointer accent-primary"
                        aria-valuemin="8"
                        aria-valuemax="64"
                        aria-valuenow="16"
                    >
                </div>

                <!-- Checkboxes -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <input type="checkbox" id="include-upper" checked class="w-5 h-5 rounded border-slate-700 bg-slate-800 text-primary focus:ring-primary focus:ring-offset-slate-900 transition-all">
                        <span class="text-slate-300 group-hover:text-white transition-colors">Letras maiúsculas (A-Z)</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <input type="checkbox" id="include-lower" checked class="w-5 h-5 rounded border-slate-700 bg-slate-800 text-primary focus:ring-primary focus:ring-offset-slate-900 transition-all">
                        <span class="text-slate-300 group-hover:text-white transition-colors">Letras minúsculas (a-z)</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <input type="checkbox" id="include-numbers" checked class="w-5 h-5 rounded border-slate-700 bg-slate-800 text-primary focus:ring-primary focus:ring-offset-slate-900 transition-all">
                        <span class="text-slate-300 group-hover:text-white transition-colors">Números (0-9)</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <input type="checkbox" id="include-symbols" checked class="w-5 h-5 rounded border-slate-700 bg-slate-800 text-primary focus:ring-primary focus:ring-offset-slate-900 transition-all">
                        <span class="text-slate-300 group-hover:text-white transition-colors">Símbolos (!@#$...)</span>
                    </label>
                </div>

                <!-- Generate Button -->
                <button 
                    id="generate-btn" 
                    class="w-full gradient-bg hover:opacity-90 py-5 rounded-2xl text-xl font-display font-bold text-white shadow-xl shadow-primary/20 transform transition-all active:scale-95 flex items-center justify-center gap-3"
                    aria-label="Gerar nova senha"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 animate-spin-slow" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Gerar Nova Senha
                </button>
            </div>
        </section>
    </main>

    <!-- Footer | @seo-expert-amb @owasp-secure-code -->
    <footer class="relative z-10 py-12 px-4 shadow-inner">
        <div class="max-w-4xl mx-auto border-t border-slate-800 pt-8 text-center text-slate-500 text-sm">
            by Andre Maurell - 2026
        </div>
    </footer>

    <!-- Scripts | @algorithmic-art @poo-amb @owasp-secure-code -->
    <script>
        /**
         * @class SecureGenerator
         * @description Classe responsável logicamente pela geração de senhas seguras.
         * @principles POO - Encapsulation, @owasp-secure-code - Cryptography
         */
        class SecureGenerator {
            constructor() {
                this.charSets = {
                    upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
                    lower: "abcdefghijklmnopqrstuvwxyz",
                    numbers: "0123456789",
                    symbols: "!@#$%^&*()_+~`|}{[]:;?><,./-="
                };
            }

            /**
             * Gera uma senha usando CSPRNG (Cryptographically Secure Pseudo-Random Number Generator)
             * @param {Object} options - Configurações de geração
             * @returns {string} - Senha gerada
             */
            generate(options) {
                let pool = "";
                if (options.upper) pool += this.charSets.upper;
                if (options.lower) pool += this.charSets.lower;
                if (options.numbers) pool += this.charSets.numbers;
                if (options.symbols) pool += this.charSets.symbols;

                if (pool === "") return "";

                const password = Array.from(window.crypto.getRandomValues(new Uint32Array(options.length)))
                    .map((x) => pool[x % pool.length])
                    .join("");

                return password;
            }
        }

        /**
         * @class AppController
         * @description Controlador da Interface do Usuário (UI).
         * @principles POO - Single Responsibility
         */
        class AppController {
            constructor() {
                this.generator = new SecureGenerator();
                this.elements = {
                    result: document.getElementById('password-result'),
                    slider: document.getElementById('length-slider'),
                    lengthVal: document.getElementById('length-value'),
                    btnGenerate: document.getElementById('generate-btn'),
                    btnCopy: document.getElementById('copy-btn'),
                    btnVisibility: document.getElementById('visibility-btn'),
                    checks: {
                        upper: document.getElementById('include-upper'),
                        lower: document.getElementById('include-lower'),
                        numbers: document.getElementById('include-numbers'),
                        symbols: document.getElementById('include-symbols')
                    }
                };
                this.isVisible = false;
                this.init();
            }

            init() {
                this.elements.slider.addEventListener('input', (e) => this.handleSlider(e));
                this.elements.btnGenerate.addEventListener('click', () => this.handleGenerate());
                this.elements.btnCopy.addEventListener('click', () => this.handleCopy());
                this.elements.btnVisibility.addEventListener('click', () => this.toggleVisibility());
                
                // Inicializar com uma senha
                this.handleGenerate();
            }

            handleSlider(e) {
                this.elements.lengthVal.textContent = e.target.value;
            }

            handleGenerate() {
                const options = {
                    length: parseInt(this.elements.slider.value),
                    upper: this.elements.checks.upper.checked,
                    lower: this.elements.checks.lower.checked,
                    numbers: this.elements.checks.numbers.checked,
                    symbols: this.elements.checks.symbols.checked
                };

                const password = this.generator.generate(options);
                this.currentPassword = password;
                this.updateDisplay();
            }

            updateDisplay() {
                if (this.isVisible) {
                    this.elements.result.value = this.currentPassword;
                } else {
                    this.elements.result.value = "•".repeat(this.currentPassword.length);
                }
            }

            toggleVisibility() {
                this.isVisible = !this.isVisible;
                this.updateDisplay();
                // Update icon (simplified)
                this.elements.btnVisibility.classList.toggle('text-primary');
            }

            async handleCopy() {
                if (!this.currentPassword) return;
                try {
                    await navigator.clipboard.writeText(this.currentPassword);
                } catch (err) {
                    console.error('Falha ao copiar:', err);
                }
            }
        }

        /**
         * @function p5 Background Sketch
         * @description Gerador de arte algorítmica de fundo (Flow Field).
         * @skills @algorithmic-art
         */
        let particles = [];
        const numParticles = 80;

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('p5-canvas-container');
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
            background(2, 6, 23);
        }

        function draw() {
            // Subtle trail effect
            background(2, 6, 23, 10);
            
            for (let p of particles) {
                p.update();
                p.display();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = random(0.5, 2);
                this.color = color(37, 99, 235, random(20, 50)); // Deep Blue with low alpha
            }

            update() {
                // Flow field logic (simplified)
                const angle = noise(this.pos.x * 0.002, this.pos.y * 0.002, frameCount * 0.002) * TWO_PI * 2;
                this.acc = p5.Vector.fromAngle(angle);
                this.acc.mult(0.1);
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);

                if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
                    this.reset();
                }
            }

            display() {
                stroke(this.color);
                strokeWeight(random(1, 3));
                point(this.pos.x, this.pos.y);
            }
        }

        // Initialize Application
        window.addEventListener('DOMContentLoaded', () => {
            new AppController();
        });
    </script>
</body>
</html>
